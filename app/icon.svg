<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Left ring -->
  <circle cx="13" cy="16" r="7" stroke="#C9A96E" stroke-width="2.8" fill="none"/>
  <!-- Right ring -->
  <circle cx="20" cy="16" r="7" stroke="#C9A96E" stroke-width="2.8" fill="none"/>
  <!-- Overlap fill to blend intersection -->
  <path d="M16.5 10.2 C18.2 12 18.2 20 16.5 21.8 C14.8 20 14.8 12 16.5 10.2Z" fill="#fff"/>
  <!-- Re-draw ring strokes over the fill so they look clean -->
  <circle cx="13" cy="16" r="7" stroke="#C9A96E" stroke-width="2.8" fill="none"/>
  <circle cx="20" cy="16" r="7" stroke="#C9A96E" stroke-width="2.8" fill="none"/>
</svg>
